<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Gaudium Demandas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-banner">
            <div class="banner-content">
                <h1>GAUDIUM</h1>
                <p>Plataforma Inteligente de Gestão de Demandas e Fluxos Operacionais.</p>
            </div>
            <div class="shape-blob"></div>
        </div>

        <div class="login-form-section">
            <div class="form-wrapper">
                <h2>Bem-vindo de volta</h2>
                <p class="subtitle">Insira suas credenciais corporativas para acessar o painel.</p>

                <div id="login-error" class="error-message" style="display: none;"></div>

                <form id="form-login">
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required placeholder="exemplo@gaudium.com.br">
                    </div>
                    <div class="input-group">
                        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px;">
                            <label for="senha" style="margin-bottom: 0;">Senha</label>
                            <a href="#" id="esqueci-senha" style="font-size: 0.8rem; color: #4a148c; text-decoration: none; font-weight: 600; transition: 0.2s;">Esqueceu a senha?</a>
                        </div>
                        <input type="password" id="senha" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-login" id="btn-submit">Entrar na Plataforma</button>
                </form>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
